[project]
name = "orchestrator"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "interface-engine",
    "interface-tasks",
    "pyyaml",
]

[tools.uv.sources]
interface-engine = { workspace = true }
interface-tasks = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestrator"]
