[project]
name = "tasks-bifrost"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "interface-tasks",
    "requests",
]

[tools.uv.sources]
interface-tasks = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tasks_bifrost"]
