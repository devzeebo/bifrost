name: Feature request
description: Suggest an idea or enhancement for Bifrost
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please search existing issues
        first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's currently hard or impossible?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Include examples or CLI/API sketches if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they fall short.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI (`bf`)
        - Server / API
        - Admin UI
        - Orchestrator
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related runes, or anything else.
